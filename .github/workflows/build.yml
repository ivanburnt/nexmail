name: Build and Push NexMail Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 1️⃣ Клонируем репо
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Логинимся в GHCR
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3️⃣ Получаем версию из Dockerfile
      - name: Extract NEXMAIL_VERSION
        id: version
        run: |
          VERSION=$(grep 'ARG NEXMAIL_VERSION=' Dockerfile | cut -d= -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # 4️⃣ Собираем и пушим образ
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/nexmail:${{ steps.version.outputs.VERSION }}
